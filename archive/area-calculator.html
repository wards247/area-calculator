<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A24地块 - 网格面积计算</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
    }
    .header {
      padding: 10px 16px;
      background: linear-gradient(135deg, #2e7d32, #43a047);
      color: white;
      text-align: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 17px; font-weight: 600; letter-spacing: 1px; }
    .header p { font-size: 11px; opacity: 0.9; margin-top: 3px; }

    .legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 6px;
      font-size: 11px;
      color: #666;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-box { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #ccc; }

    .svg-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      background: #fafafa;
      position: relative;
      overflow: hidden;
    }
    #map {
      width: 100%;
      height: 100%;
      max-height: 55vh;
      touch-action: none;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      padding: 10px 6px;
      background: #fff;
      border-top: 1px solid #e8e8e8;
      flex-shrink: 0;
    }
    .stat-item {
      text-align: center;
      flex: 1;
      padding: 4px;
    }
    .stat-item .label {
      display: block;
      font-size: 10px;
      color: #999;
      margin-bottom: 2px;
    }
    .stat-item .value {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: #2e7d32;
      line-height: 1.2;
    }
    .stat-item .sub {
      font-size: 10px;
      color: #aaa;
      font-weight: 400;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 8px 16px 12px;
      background: #fff;
      flex-shrink: 0;
    }
    .controls button {
      padding: 7px 18px;
      border: none;
      border-radius: 18px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .controls button:active { transform: scale(0.95); }
    .btn-clear { background: #ffebee; color: #c62828; }
    .btn-clear:active { background: #ffcdd2; }
    .btn-all { background: #e8f5e9; color: #2e7d32; }
    .btn-all:active { background: #c8e6c9; }
    .btn-pond { background: #e3f2fd; color: #1565c0; }
    .btn-pond.active { background: #1565c0; color: #fff; }
    .btn-pond:active { background: #bbdefb; }

    .tips {
      padding: 6px 16px 10px;
      background: #fffbeb;
      border-top: 1px solid #fef3c7;
      flex-shrink: 0;
    }
    .tips p {
      font-size: 10px;
      color: #a16207;
      text-align: center;
      line-height: 1.4;
    }

    /* 选中格子的脉冲动画 */
    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>A24 地块面积计算器</h1>
      <p>总面积 1.12亩 | 正方格子法 | 滑动点选</p>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-box" style="background:#f1f8e9;"></div>
        <span>空地</span>
      </div>
      <div class="legend-item">
        <div class="legend-box" style="background:#66bb6a;"></div>
        <span>已选</span>
      </div>
      <div class="legend-item">
        <div class="legend-box" style="background:#b3e5fc;"></div>
        <span>池塘</span>
      </div>
    </div>

    <div class="svg-wrap">
      <svg id="map" viewBox="0 0 250 400" preserveAspectRatio="xMidYMid meet">
        <!-- A24外轮廓 -->
        <path id="a24-outline" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>

        <!-- 池塘区域 -->
        <path id="pond-outline" fill="#b3e5fc" stroke="#0288d1" stroke-width="1"
              stroke-dasharray="4,3" opacity="0.6"/>

        <!-- 网格格子组 -->
        <g id="grid-group"></g>

        <!-- 地块标注 -->
        <text x="125" y="175" text-anchor="middle" fill="#1b5e20" font-size="15"
              font-weight="bold" pointer-events="none" style="text-shadow:0 0 3px rgba(255,255,255,0.8);">A24</text>
        <text x="125" y="194" text-anchor="middle" fill="#1b5e20" font-size="10"
              pointer-events="none">张绍旺</text>
        <text x="125" y="210" text-anchor="middle" fill="#1b5e20" font-size="10"
              pointer-events="none">S = 1.12亩</text>
        <text x="125" y="225" text-anchor="middle" fill="#558b2f" font-size="8"
              pointer-events="none">竹子800棵 · 杂树中0.6亩</text>

        <!-- 池塘标注 -->
        <text x="82" y="265" text-anchor="middle" fill="#01579b" font-size="9"
              pointer-events="none" opacity="0.8">池塘</text>
      </svg>
    </div>

    <div class="stats">
      <div class="stat-item">
        <span class="label">每格面积</span>
        <span class="value" id="per-cell">--</span>
        <span class="sub" id="per-cell-sub">--</span>
      </div>
      <div class="stat-item">
        <span class="label">选中格数</span>
        <span class="value" id="cell-count">0</span>
        <span class="sub" id="cell-count-sub">共--格</span>
      </div>
      <div class="stat-item">
        <span class="label">选中面积</span>
        <span class="value" id="area-mu">0.000亩</span>
        <span class="sub" id="area-sqm">0.0㎡</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn-clear" id="btn-clear">清空</button>
      <button class="btn-all" id="btn-all">全选</button>
      <button class="btn-pond" id="btn-pond">排除池塘</button>
    </div>

    <div class="tips">
      <p>按住滑动即可批量选择格子。滑过已选格子自动取消。<br>单指触摸，滑动选区，松开结束。</p>
    </div>
  </div>

  <script>
    (function() {
      // ==================== 配置 ====================
      const TOTAL_AREA_MU = 1.12;          // 总面积（亩）
      const TOTAL_AREA_SQM = TOTAL_AREA_MU * 666.6667; // 总面积（平方米）
      const CELL_SIZE = 20;                // 网格边长（SVG单位）

      // A24 外轮廓坐标（逆时针，基于规划图形状）
      const a24Outline = [
        [95, 40],    // 顶部左
        [130, 45],   // 顶部右
        [150, 95],   // 右上
        [156, 180],  // 右中上
        [150, 265],  // 右中下
        [130, 340],  // 底部右
        [90, 345],   // 底部左
        [60, 270],   // 左下（池塘边缘起点）
        [50, 195],   // 左中
        [62, 115]    // 左上
      ];

      // 池塘轮廓坐标（A24内部水域）
      const pondOutline = [
        [62, 240], [82, 228], [102, 238], [110, 262],
        [102, 288], [82, 298], [60, 285], [55, 262]
      ];

      // ==================== 工具函数 ====================

      /**
       * 射线法判断点是否在多边形内
       */
      function pointInPolygon(x, y, polygon) {
        let inside = false;
        for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
          const xi = polygon[i][0], yi = polygon[i][1];
          const xj = polygon[j][0], yj = polygon[j][1];
          const intersect = ((yi > y) !== (yj > y)) &&
            (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
          if (intersect) inside = !inside;
        }
        return inside;
      }

      /**
       * 计算多边形面积（鞋带公式）
       */
      function polygonArea(poly) {
        let area = 0;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
          area += poly[j][0] * poly[i][1];
          area -= poly[i][0] * poly[j][1];
        }
        return Math.abs(area) / 2;
      }

      // ==================== 生成网格 ====================

      const allX = a24Outline.map(p => p[0]);
      const allY = a24Outline.map(p => p[1]);
      const minX = Math.min(...allX);
      const maxX = Math.max(...allX);
      const minY = Math.min(...allY);
      const maxY = Math.max(...allY);

      const cells = [];       // 所有格子
      const pondCellIdx = []; // 池塘格子索引
      let totalCells = 0;

      // 在 bounding box 范围内生成候选格子
      const startCol = Math.floor(minX / CELL_SIZE);
      const endCol   = Math.ceil(maxX / CELL_SIZE);
      const startRow = Math.floor(minY / CELL_SIZE);
      const endRow   = Math.ceil(maxY / CELL_SIZE);

      for (let row = startRow; row < endRow; row++) {
        for (let col = startCol; col < endCol; col++) {
          const cx = col * CELL_SIZE + CELL_SIZE / 2; // 格子中心 X
          const cy = row * CELL_SIZE + CELL_SIZE / 2; // 格子中心 Y

          if (pointInPolygon(cx, cy, a24Outline)) {
            const isPond = pointInPolygon(cx, cy, pondOutline);
            cells.push({
              id: `c-${row}-${col}`,
              row, col,
              x: col * CELL_SIZE,
              y: row * CELL_SIZE,
              cx, cy,
              isPond,
              selected: false,
              el: null
            });
            if (isPond) pondCellIdx.push(cells.length - 1);
          }
        }
      }

      totalCells = cells.length;

      // 每格实际面积（按实际格数均摊，确保总量精确等于1.12亩）
      const cellAreaMu  = TOTAL_AREA_MU / totalCells;
      const cellAreaSqm = TOTAL_AREA_SQM / totalCells;

      // ==================== 渲染 ====================

      const svg = document.getElementById('map');
      const gridGroup = document.getElementById('grid-group');

      // 设置轮廓 path
      document.getElementById('a24-outline')
        .setAttribute('d', 'M ' + a24Outline.map(p => p.join(',')).join(' L ') + ' Z');
      document.getElementById('pond-outline')
        .setAttribute('d', 'M ' + pondOutline.map(p => p.join(',')).join(' L ') + ' Z');

      // 渲染每个格子
      cells.forEach((cell, idx) => {
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('id', cell.id);
        rect.setAttribute('x', cell.x + 0.5);
        rect.setAttribute('y', cell.y + 0.5);
        rect.setAttribute('width', CELL_SIZE - 1);
        rect.setAttribute('height', CELL_SIZE - 1);
        rect.setAttribute('rx', '2');
        rect.setAttribute('data-idx', idx);
        rect.style.cursor = 'pointer';
        rect.style.transition = 'fill 0.12s ease, stroke 0.12s ease';

        // 初始样式
        if (cell.isPond) {
          rect.setAttribute('fill', '#e1f5fe');
          rect.setAttribute('stroke', '#81d4fa');
          rect.setAttribute('stroke-width', '0.5');
        } else {
          rect.setAttribute('fill', '#f1f8e9');
          rect.setAttribute('stroke', '#c8e6c9');
          rect.setAttribute('stroke-width', '0.5');
        }

        cell.el = rect;
        gridGroup.appendChild(rect);
      });

      // ==================== 统计更新 ====================

      const elPerCell    = document.getElementById('per-cell');
      const elPerCellSub = document.getElementById('per-cell-sub');
      const elCount      = document.getElementById('cell-count');
      const elCountSub   = document.getElementById('cell-count-sub');
      const elAreaMu     = document.getElementById('area-mu');
      const elAreaSqm    = document.getElementById('area-sqm');

      function updateStats() {
        const selected = cells.filter(c => c.selected);
        const count = selected.length;
        const areaMu  = count * cellAreaMu;
        const areaSqm = count * cellAreaSqm;

        elCount.textContent = count;
        elAreaMu.textContent = areaMu.toFixed(3) + '亩';
        elAreaSqm.textContent = areaSqm.toFixed(1) + '㎡';
      }

      function updateCellVisual(idx) {
        const cell = cells[idx];
        if (!cell || !cell.el) return;

        if (cell.selected) {
          if (cell.isPond) {
            cell.el.setAttribute('fill', '#29b6f6');
            cell.el.setAttribute('stroke', '#01579b');
          } else {
            cell.el.setAttribute('fill', '#66bb6a');
            cell.el.setAttribute('stroke', '#2e7d32');
          }
        } else {
          if (cell.isPond) {
            cell.el.setAttribute('fill', '#e1f5fe');
            cell.el.setAttribute('stroke', '#81d4fa');
          } else {
            cell.el.setAttribute('fill', '#f1f8e9');
            cell.el.setAttribute('stroke', '#c8e6c9');
          }
        }
      }

      // 初始化显示
      elPerCell.textContent = cellAreaMu.toFixed(3) + '亩';
      elPerCellSub.textContent = (cellAreaSqm).toFixed(1) + '㎡ /格';
      elCountSub.textContent = '共' + totalCells + '格';
      updateStats();

      // ==================== 交互 ====================

      let isDragging = false;
      let dragMode = null; // 'select' | 'deselect'

      /**
       * 根据屏幕坐标获取对应的格子索引
       */
      function getCellIndexFromClient(clientX, clientY) {
        const pt = svg.createSVGPoint();
        pt.x = clientX;
        pt.y = clientY;
        const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
        const col = Math.floor(svgP.x / CELL_SIZE);
        const row = Math.floor(svgP.y / CELL_SIZE);
        const cell = cells.find(c => c.col === col && c.row === row);
        return cell ? cells.indexOf(cell) : -1;
      }

      /**
       * 切换单个格子状态（仅在模式匹配时执行）
       */
      function applyCell(idx, mode) {
        if (idx < 0 || idx >= cells.length) return;
        const cell = cells[idx];
        if (mode === 'select' && !cell.selected) {
          cell.selected = true;
          updateCellVisual(idx);
          updateStats();
        } else if (mode === 'deselect' && cell.selected) {
          cell.selected = false;
          updateCellVisual(idx);
          updateStats();
        }
      }

      /**
       * 开始拖拽选择
       */
      function startDrag(clientX, clientY) {
        const idx = getCellIndexFromClient(clientX, clientY);
        if (idx < 0) return;
        isDragging = true;
        dragMode = cells[idx].selected ? 'deselect' : 'select';
        applyCell(idx, dragMode);
      }

      /**
       * 拖拽中
       */
      function moveDrag(clientX, clientY) {
        if (!isDragging) return;
        const idx = getCellIndexFromClient(clientX, clientY);
        if (idx >= 0) applyCell(idx, dragMode);
      }

      /**
       * 结束拖拽
       */
      function endDrag() {
        isDragging = false;
        dragMode = null;
      }

      // 鼠标事件
      svg.addEventListener('mousedown', e => {
        e.preventDefault();
        startDrag(e.clientX, e.clientY);
      });
      window.addEventListener('mousemove', e => {
        if (isDragging) {
          e.preventDefault();
          moveDrag(e.clientX, e.clientY);
        }
      });
      window.addEventListener('mouseup', endDrag);

      // 触摸事件
      svg.addEventListener('touchstart', e => {
        if (e.touches.length !== 1) return;
        e.preventDefault();
        const t = e.touches[0];
        startDrag(t.clientX, t.clientY);
      }, { passive: false });

      window.addEventListener('touchmove', e => {
        if (!isDragging) return;
        if (e.touches.length !== 1) { endDrag(); return; }
        e.preventDefault();
        const t = e.touches[0];
        moveDrag(t.clientX, t.clientY);
      }, { passive: false });

      window.addEventListener('touchend', endDrag);
      window.addEventListener('touchcancel', endDrag);

      // ==================== 按钮功能 ====================

      document.getElementById('btn-clear').addEventListener('click', () => {
        cells.forEach((c, i) => {
          c.selected = false;
          updateCellVisual(i);
        });
        updateStats();
      });

      document.getElementById('btn-all').addEventListener('click', () => {
        cells.forEach((c, i) => {
          c.selected = true;
          updateCellVisual(i);
        });
        updateStats();
      });

      let pondExcluded = false;
      const btnPond = document.getElementById('btn-pond');
      btnPond.addEventListener('click', () => {
        pondExcluded = !pondExcluded;
        btnPond.textContent = pondExcluded ? '包含池塘' : '排除池塘';
        btnPond.classList.toggle('active', pondExcluded);

        pondCellIdx.forEach(idx => {
          const cell = cells[idx];
          if (pondExcluded) {
            cell.selected = false;
          }
          updateCellVisual(idx);
        });
        updateStats();
      });

    })();
  </script>
</body>
</html>
